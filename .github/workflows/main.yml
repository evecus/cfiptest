name: Build binaries

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: cf-ip-optimizer-linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact: cf-ip-optimizer-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/cf-ip-optimizer ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
