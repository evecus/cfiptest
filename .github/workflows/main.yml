name: Rust Backend CI

on:
  push:
    paths:
      - 'backend-rust/**'
      - '.github/workflows/rust-backend.yml'
  pull_request:
    paths:
      - 'backend-rust/**'
      - '.github/workflows/rust-backend.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo test --all --quiet

  build-linux-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    defaults:
      run:
        working-directory: backend-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pbox-speedtest-backend dist/pbox-speedtest-backend-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: pbox-speedtest-backend-${{ matrix.target }}
          path: backend-rust/dist/pbox-speedtest-backend-${{ matrix.target }}
