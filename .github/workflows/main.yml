name: Rust Backend CI

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo test --all --quiet

  build-linux-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            cc: aarch64-linux-gnu-gcc
            cxx: aarch64-linux-gnu-g++
            ar: aarch64-linux-gnu-ar
            linker: aarch64-linux-gnu-gcc
    defaults:
      run:
        working-directory: backend-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libc6-dev-arm64-cross

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cc || '' }}
          CXX_aarch64_unknown_linux_gnu: ${{ matrix.cxx || '' }}
          AR_aarch64_unknown_linux_gnu: ${{ matrix.ar || '' }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/pbox-speedtest-backend dist/pbox-speedtest-backend-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: pbox-speedtest-backend-${{ matrix.target }}
          path: backend-rust/dist/pbox-speedtest-backend-${{ matrix.target }}
